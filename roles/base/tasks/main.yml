---
- name: Install packages
  ansible.builtin.include_role:
    name: _common
    tasks_from: packages
  vars:
    _common_packages: "{{ packages }}"

- name: Copy configuration files
  ansible.builtin.copy:
    src: "{{ item }}"
    dest: "{{ xdg_config_home }}"
  loop: "{{ configured_apps }}"

- name: Finish setup of installed packages
  ansible.builtin.include_tasks: "./{{ item }}.yml"
  loop: "{{ custom_setup_apps | intersect(configured_apps) }}"
