---
- name: Install general packages (Arch Linux)
  community.general.pacman:
    name: "{{ packages.general }}"
  become: true
  when: ansible_facts["os_family"] == "Archlinux"

- name: Install development packages (Arch Linux)
  community.general.pacman:
    name: "{{ packages.development }}"
  become: true
  when: ansible_facts["os_family"] == "Archlinux"

- name: Install AUR packages (Arch Linux)
  ansible.builtin.include_role:
    name: _common
    tasks_from: aur
  vars:
    pkgs: "{{ packages.aur }}"
  when: ansible_facts["os_family"] == "Archlinux"
