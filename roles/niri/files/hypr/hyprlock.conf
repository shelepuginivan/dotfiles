$font = Monospace
$primaryMonitor = DP-1

general {
    hide_cursor = true
}

animations {
    enabled = true
    bezier = linear, 1, 1, 0, 0
    animation = fadeIn, 1, 5, linear
    animation = fadeOut, 1, 5, linear
    animation = inputFieldDots, 1, 2, linear
}

background {
    monitor =
    path = screenshot
    blur_passes = 3
}

input-field {
    monitor = $primaryMonitor
    size = 20%, 5%
    outline_thickness = 3
    inner_color = rgba(0, 0, 0, 0.0)

    outer_color = rgba(d9d8d8ee)
    check_color = rgba(dbbc7fee) rgba(fabd2fee) 120deg
    fail_color = rgba(e67e80ee) rgba(de5356ee) 40deg

    font_color = rgba(d9d8d8ee)
    fade_on_empty = false
    rounding = 8

    font_family = $font
    placeholder_text = Input password...
    fail_text = $PAMFAIL
    dots_spacing = 0.3

    position = 0, -20
    halign = center
    valign = center
}

label {
    monitor = $primaryMonitor
    text = $TIME
    font_size = 100
    font_family = $font

    position = 0, 256
    halign = center
    valign = center
}

label {
    monitor = $primaryMonitor
    text = $LAYOUT[en,ru]
    font_size = 32

    position = -80, 80
    halign = right
    valign = bottom
}
